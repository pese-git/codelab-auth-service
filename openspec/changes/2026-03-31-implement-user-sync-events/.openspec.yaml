# OpenSpec Change: Event-Driven синхронизация и Token Blacklist (Auth Service)

**Версия:** 1.0.0  
**Дата:** 31 марта 2026  
**Сервис:** codelab-auth-service

---

## 🔴 Проблема (Why)

### Текущее состояние

В текущей системе:

1. **Отозванные токены остаются активными** — При удалении пользователя в auth-service, выданные JWT токены остаются валидными до истечения срока действия (exp claim). Пользователь может продолжать делать запросы в core-service используя старый токен.

2. **Нет синхронизации между сервисами** — Удаление пользователя в auth-service не влечет за собой автоматическое удаление данных в core-service (проекты, агенты, чат-сессии). Это приводит к:
   - Хаянию данных в БД
   - Рассогласованности состояния между сервисами
   - Потенциальным проблемам с доступом после удаления

3. **Отсутствие уведомлений** — Core-service не знает об событиях в auth-service (удаление, обновление пользователя), что затрудняет синхронизацию.

### Влияние на систему

- ⚠️ **Безопасность**: отозванные токены могут использоваться для неавторизованного доступа
- ⚠️ **Целостность данных**: orphaned данные в core-service после удаления пользователя
- ⚠️ **Пользовательский опыт**: удаленный пользователь может случайно получить доступ через старый токен

---

## 💚 Решение (What Changes)

### Компоненты, которые добавляются в auth-service

#### 1. **Token Blacklist Service** 
- Redis-based хранилище отозванных токенов с TTL
- API для отзыва отдельного токена или всех токенов пользователя
- Поддержка метаданных отзыва (причина, администратор, время)

#### 2. **Event Publisher (Redis Streams)**
- Публикация событий в Redis Streams: `user_events`
- События: `user.created`, `user.updated`, `user.deleted`
- Транзакционная гарантия (события публикуются ПОСЛЕ commit в БД)

#### 3. **Обновленный User Deletion Flow**
- При удалении пользователя:
  1. ✅ Отозвать все активные токены в blacklist
  2. ✅ Опубликовать `user.deleted` событие
  3. ✅ Commit в БД
  4. 🎯 Trigger CASCADE delete в core-service

#### 4. **API Endpoints (опционально)**
- `POST /admin/users/{user_id}/tokens/revoke` — отозвать все токены
- `POST /admin/users/{user_id}/delete` — удалить пользователя (с событием)

