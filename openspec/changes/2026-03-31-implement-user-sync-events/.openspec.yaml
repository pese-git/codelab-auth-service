## 📊 Альтернативные решения (Alternatives)

### Альтернатива 1: RabbitMQ (вместо Redis Streams)

**Преимущества:**
- Встроенный Dead Letter Queue (DLQ) для обработки ошибок
- Более надежная доставка сообщений
- Enterprise-grade надежность

**Недостатки:**
- Новая инфраструктура (дополнительный container)
- Больше ресурсов (память, CPU)
- Сложнее в настройке

**Рекомендация:** Выбираем **Redis Streams** для MVP (есть Redis, меньше операционной нагрузки). Migration path: Redis → RabbitMQ → Kafka по мере роста.

### Альтернатива 2: Transactional Outbox Pattern

**Преимущества:**
- 100% гарантия доставки (события в DB таблице)
- Можно пересылать при сбоях

**Недостатки:**
- Усложнение логики (extra таблица + background job)
- Больше queries к БД
- Запоздание при масштабировании

**Рекомендация:** Для v1.0 используем simple publish. Outbox pattern может быть добавлен в v2.0 если требуется 100% гарантия.

### Альтернатива 3: Синхронная RPC (вместо async events)

**Преимущества:**
- Простая интеграция (один HTTP call)
- Известен результат выполнения

**Недостатки:**
- 🔴 Тесная связь между сервисами
- 🔴 Если core-service недоступен, удаление пользователя падает
- 🔴 Медленнее (ждем ответ)

**Рекомендация:** НЕ рекомендуется. Асинхронный подход лучше для микросервисной архитектуры.

