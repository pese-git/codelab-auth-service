## ⚠️ Риски и Митигация

| Риск | Вероятность | Impact | Митигация |
|------|------------|--------|-----------|
| Токен не попадает в blacklist | Низкая | Критический | Unit тесты + логирование каждого revoke |
| Redis недоступен при revoke | Средняя | Высокий | Graceful degradation, retry logic |
| Event не доставляется в core | Средняя | Высокий | DLQ мониторинг, manual retry CLI |
| Race condition (token выкупается до revoke) | Низкая | Средний | Только exp claim как fallback |
| Eventов забивается >100k | Низкая | Средний | Auto-prune in Redis Streams (MAXLEN) |

**Стратегия:**
1. ✅ Redis as primary blacklist
2. ✅ exp claim as secondary check в middleware
3. ✅ Graceful fallback если Redis down
4. ✅ Alerts если DLQ растет

---

## 🎯 Успешное внедрение означает

- ✅ Отозванный токен = блокирован в течение 100ms
- ✅ Удаленный пользователь = все данные удалены в core-service
- ✅ Нет orphaned данных в системе
- ✅ Event delivery rate > 99.9%
- ✅ Нет потери токенов в blacklist при перезагрузке (TTL)

---

## 📈 Метрики успеха

### Функциональные
- Token revocation latency: p95 < 100ms
- Event delivery latency: p95 < 500ms
- Cascade delete latency: p95 < 5s
- Event loss rate: < 0.1%

### Операционные
- Redis memory usage < 1GB
- DLQ size < 100 messages
- Blacklist key expires correctly (TTL working)

