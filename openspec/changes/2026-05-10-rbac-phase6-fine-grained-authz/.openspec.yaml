title: "RBAC Phase 6: Fine-Grained Authorization (UMA 2.0)"
description: |
  Реализация fine-grained авторизации (FGA) с UMA 2.0 поддержкой.
  Permission-based система разрешений для resource-level доступа.
  Dynamically управляемые разрешения через Policy Decision Point (PDP).

