version: '3.8'

services:
  auth-service:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "${AUTH_SERVICE_PORT:-8003}:8003"
    volumes:
      - ./data:/app/data  # SQLite БД
      - ./keys:/app/keys  # RSA ключи
    environment:
      - ENVIRONMENT=${ENVIRONMENT:-development}
      - PORT=8003
      - AUTH_SERVICE__DB_URL=${AUTH_SERVICE__DB_URL:-sqlite:///data/auth.db}
      - AUTH_SERVICE__REDIS_URL=redis://redis:6379/1
      - AUTH_SERVICE__LOG_LEVEL=${AUTH_SERVICE__LOG_LEVEL:-DEBUG}
      - AUTH_SERVICE__JWT_ISSUER=https://auth.codelab.local
      - AUTH_SERVICE__JWT_AUDIENCE=codelab-api
      - AUTH_SERVICE__ACCESS_TOKEN_LIFETIME=900
      - AUTH_SERVICE__REFRESH_TOKEN_LIFETIME=2592000
      - AUTH_SERVICE__PRIVATE_KEY_PATH=/app/keys/private_key.pem
      - AUTH_SERVICE__PUBLIC_KEY_PATH=/app/keys/public_key.pem
      # SMTP Configuration for MailHog
      - AUTH_SERVICE__SMTP_HOST=${AUTH_SERVICE__SMTP_HOST:-mailhog}
      - AUTH_SERVICE__SMTP_PORT=${AUTH_SERVICE__SMTP_PORT:-1025}
      - AUTH_SERVICE__SMTP_USERNAME=${AUTH_SERVICE__SMTP_USERNAME:-}
      - AUTH_SERVICE__SMTP_PASSWORD=${AUTH_SERVICE__SMTP_PASSWORD:-}
      - AUTH_SERVICE__SMTP_FROM_EMAIL=${AUTH_SERVICE__SMTP_FROM_EMAIL:-noreply@codelab.local}
      - AUTH_SERVICE__SMTP_USE_TLS=${AUTH_SERVICE__SMTP_USE_TLS:-false}
      - AUTH_SERVICE__SEND_WELCOME_EMAIL=${AUTH_SERVICE__SEND_WELCOME_EMAIL:-true}
      - AUTH_SERVICE__SEND_PASSWORD_RESET_EMAIL=${AUTH_SERVICE__SEND_PASSWORD_RESET_EMAIL:-true}
      - AUTH_SERVICE__REQUIRE_EMAIL_CONFIRMATION=${AUTH_SERVICE__REQUIRE_EMAIL_CONFIRMATION:-true}
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
      mailhog:
        condition: service_started
    restart: unless-stopped
    networks:
      - codelab-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8003/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s

  mailhog:
    image: mailhog/mailhog:latest
    ports:
      - "1025:1025"  # SMTP
      - "8025:8025"  # Web UI
    networks:
      - codelab-network
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    networks:
      - codelab-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres:
    image: postgres:16-alpine
    #container_name: codelab-ai-service-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-codelab-auth-db}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    networks:
      - codelab-network

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  codelab-network:
    driver: bridge